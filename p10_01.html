<!DOCTYPE html>
<html>
<head>
  <title>HTML Form - No JavaScript</title>
</head>

<body>
  <h2>HTML FORM</h2>
  
  <form action="#" method="post">
    <label for="num">Enter a number:</label><br>
    <input type="number" id="num" name="num" required><br><br>

    <input type="button" value="Click me" id="btnans"><br><br>

    <label for="output">Answer:</label><br>
    <span id="spansquare"></span>
  </form>

  <script>
    let txtnum = document.querySelector("#num");
    let btnans = document.querySelector("#btnans");
    let spansquare = document.querySelector("#spansquare");

    btnans.addEventListener("click", () => {
      let no = parseInt(txtnum.value);
      spansquare.innerHTML = no * no;
    });
  </script>
</body>
</html>
