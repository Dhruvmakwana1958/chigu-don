<!DOCTYPE html>
<html>
  <head>
    <title>Square or Cube Calculator (HTML Only)</title>
  </head>
  <body>
    <h2>Square or Cube Calculator</h2>
 <form>
    <label for="txtnum">Number</label>
    <input type="text" id="txtnum" placeholder="Number"/>
    <br/>
    <label><input type="radio" id="radsquare" name="a"/> Square</label>
    <label><input type="radio" id="radcube" name="a"/> Cube</label>
    <br/>
    <label>Answer <span id="spanans"></span></label>
 </form>
 <script>
let txtnum=document.querySelector("#txtnum");
let radsquare=document.querySelector("#radsquare");
let radcube=document.querySelector("#radcube");
let spanans=document.querySelector("#spanans");

radsquare.addEventListener("click",()=>{
  let num=parseInt(txtnum.value);
  spanans.innerHTML=(num*num);
})

radcube.addEventListener("click",()=>{
  let num=parseInt(txtnum.value);
  spanans.innerHTML=(num*num*num);
})
</script>



  </body>
</html>
