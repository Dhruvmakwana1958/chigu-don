<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post">
        <label for="num">Enter number 1 : </label> <br>
        <input type="number" value="num" name="number" required> <br>
        <label for="num">Enter number 2 : </label> <br>
        <input type="number" value="num2" name="number" required> <br> <br>
        <input type="button" value="Click Me" id="btnans"> <br>
        <label for="output">Ans : </label> <br> <br>
        <span id="spansquare"></span>
    </form>
    <script>
        let txtnum = document.querySelector("#num");
        let txtnum2 = document.querySelector("#num2");
        let btnans = document.querySelector("#btnans");
        let spansquare = document.querySelector("#spansquare");

        btnans.addEventListener("click", () => {
      let no = parseInt(txtnum*txtnum2.value);
      spansquare.innerHTML = no ;
      

    });

    </script>
</body>
</html>
