<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Show Images Without Function</title>
  <style>
    #imageContainer {
      display: none;
      margin-top: 20px;
    }
    #imageContainer img {
      max-width: 300px;
      margin-right: 10px;
      border: 2px solid #ccc;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <input type="button" id="btn" value="Click me" />
 
  <div id="imageContainer">
    <img src="flower3.jpg" alt="Image 1">
    <img src="rose-black.jpg" alt="Image 2">
  </div>

  <script>
    let btn = document.querySelector("#btn");
    let container = document.querySelector("#imageContainer");
    let imgs = container.querySelectorAll("img");

    btn.addEventListener("click", () => {
      imgs[0].src = "rose-black.jpg";
      imgs[1].src = "flower3.jpg";
      container.style.display = "block";
    });
  </script>
</body>
</html>
