<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
</head>

<body>

  <form>
    <label for="txtnum1">Number 1</label>
    <input type="text" id="txtnum1" placeholder="Number 1"/>
    <label for="txtnum2">Number 2</label>
    <input type="text" id="txtnum2" placeholder="Number 2"/>
    <br/>

    <label><input type="radio" id="add" name="op"/> +</label>
    <label><input type="radio" id="sub" name="op"/> -</label>
    <label><input type="radio" id="mul" name="op"/> *</label>
    <label><input type="radio" id="div" name="op"/> /</label>
    <br/>

    <label>Answer <span id="spanans"></span></label>
  </form>

</body>

<script>
let txtnum1 = document.querySelector("#txtnum1");
let txtnum2 = document.querySelector("#txtnum2");
let add = document.querySelector("#add");
let sub = document.querySelector("#sub");
let mul = document.querySelector("#mul");
let div = document.querySelector("#div");
let spanans = document.querySelector("#spanans");

add.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  spanans.innerHTML = n1 + n2;
});

sub.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  spanans.innerHTML = n1 - n2;
});

mul.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  spanans.innerHTML = n1 * n2;
});

div.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  if (n2 !== 0) {
    spanans.innerHTML = n1 / n2;
  } else {
    spanans.innerHTML = "Cannot divide by 0";
  }
});
</script>

</html>
