<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post">
        <label for="num1">Enter number 1 : </label> <br>
        <input type="number"  name="number" id="num1" required> <br>
        <label for="num2">Enter number 2 : </label> <br>
        <input type="number"  name="number" id="num2"> <br> <br>

        <label><input type="radio" id="plus" name="a"/> Add </label>
        <label><input type="radio" id="minus" name="a"/> Minus</label>
        <label><input type="radio" id="multi" name="a"/> Multiplication</label>
        <label><input type="radio" id="div" name="a"/> Division</label>

        <label>Answer <span id="spanans"></span></label>
    </form>
    <script>
        let txtnum1 = document.querySelector("#num1");
        let txtnum2 = document.querySelector("num2");
        let radadd = document.querySelector("#plus");
        let radminus = document.querySelector("minus");
        let radmulti = document.querySelector("#multi");
        let raddiv = document.querySelector("#div");
        let spanans = document.querySelector("#spanans");


  radadd.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  spanans.innerHTML = n1 + n2;
});

  radminus.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  spanans.innerHTML = n1 - n2;
});

radmulti.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  spanans.innerHTML = n1 * n2;
});

raddiv.addEventListener("click", function () {
  let n1 = parseFloat(txtnum1.value);
  let n2 = parseFloat(txtnum2.value);
  if (n2 !== 0) {
    spanans.innerHTML = n1 / n2;
  } else {
    spanans.innerHTML = "Cannot divide by 0";
  }
});


    </script>
</body>
</html>
